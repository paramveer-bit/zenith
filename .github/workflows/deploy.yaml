name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: paramveer01/zenith:latest

      - name: Verify Pushed Image
        run: docker pull paramveer01/zenith:latest
      # deploying to ec2 instance

      - name: Copy docker-compose.yaml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yaml" # The file in your GitHub repo
          target: "~/my-app-folder"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to your app directory (change this to your actual path)
            mkdir -p ~/my-app-folder
            cd ~/my-app-folder

            # 2. Create/Overwrite the .env file with current secrets
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "PORT=${{ secrets.PORT }}" >> .env
            echo "EMAIL=${{ secrets.EMAIL }}" >> .env
            echo "PASSWORD=${{ secrets.PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> .env

            sudo docker compose pull
            # 4. Restart the services
            # --remove-orphans cleans up old containers
            sudo docker compose up -d --remove-orphans
